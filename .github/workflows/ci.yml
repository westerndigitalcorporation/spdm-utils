name: SPDM-Utils-ci

on:
  push:
  pull_request:

jobs:
  ci-check:
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: thumbv7em-none-eabi

      - name: Install dependencies
        run: |
          sudo apt-get update; \
          sudo apt-get install -y cmake libclang-dev libpci-dev libssl-dev python3-dev gem libnvme-dev; \
          sudo gem install cbor-diag;

      # Ubuntu's 24.04 stock OpenSSL does not support ML-DSA.
      # Note that 26.04 should support OpenSSL 3.5, which fixes this issue.
      - name: Install OpenSSL 3.5 (for ML-DSA support)
        run: |
          set -e
          OSSL_VER=3.5.0
          OSSL_PREFIX=/opt/openssl-${OSSL_VER}
          if [ ! -x "${OSSL_PREFIX}/bin/openssl" ]; then
            curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-${OSSL_VER}/openssl-${OSSL_VER}.tar.gz" -o /tmp/openssl.tar.gz
            tar -xzf /tmp/openssl.tar.gz -C /tmp
            pushd /tmp/openssl-${OSSL_VER}

            ./Configure --prefix=${OSSL_PREFIX} --openssldir=${OSSL_PREFIX}/ssl \
              -Wl,-rpath,${OSSL_PREFIX}/lib64 -Wl,-rpath,${OSSL_PREFIX}/lib \
              no-docs no-tests shared
            make -j"$(nproc)"
            sudo make install_sw install_ssldirs

            popd
          fi

          echo "${OSSL_PREFIX}/bin" >> "$GITHUB_PATH"
          ${OSSL_PREFIX}/bin/openssl version
          ${OSSL_PREFIX}/bin/openssl list -signature-algorithms | grep -i mldsa || (echo "ML-DSA not available"; exit 1)

      - name: Build libspdm
        run: |
          pushd third-party/libspdm; \
          mkdir build; cd build; \
          cmake \
            -DARCH=x64 \
            -DTOOLCHAIN=GCC \
            -DTARGET=Debug \
            -DCRYPTO=openssl \
            -DENABLE_BINARY_BUILD=1 \
            -DCOMPILED_LIBCRYPTO_PATH=/usr/lib/ \
            -DCOMPILED_LIBSSL_PATH=/usr/lib/ \
            -DDISABLE_TESTS=1 \
            -DCMAKE_C_FLAGS=" \
                  -DLIBSPDM_ENABLE_CAPABILITY_EVENT_CAP=0 \
                  -DLIBSPDM_ENABLE_CAPABILITY_MEL_CAP=0 \
                  -DLIBSPDM_HAL_PASS_SPDM_CONTEXT=1 \
                  -DLIBSPDM_ENABLE_CAPABILITY_GET_KEY_PAIR_INFO_CAP=0 \
                  -DLIBSPDM_ENABLE_CAPABILITY_SET_KEY_PAIR_INFO_CAP=0 \
                  -DLIBSPDM_ENABLE_CAPABILITY_ENDPOINT_INFO_CAP=0 \
                  -DLIBSPDM_RECORD_TRANSCRIPT_DATA_SUPPORT=1 \
                  -DLIBSPDM_ENABLE_CAPABILITY_SET_CERT_CAP=1 \
                  -DLIBSPDM_ENABLE_CAPABILITY_CERT_CAP=1 \
                  -DLIBSPDM_ENABLE_CAPABILITY_KEY_EX_CAP=1 \
                  " \
            .. ; \
          make -j8; \
          popd;

      - name: Format
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build

      - name: Test
        run: |
          cargo test; \
          ./target/debug/spdm_utils --tcp-server response & \
          sleep 1; \
          ./target/debug/spdm_utils --tcp-client tests;

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
